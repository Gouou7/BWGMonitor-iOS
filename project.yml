name: BWGMonitor
options:
  bundleIdPrefix: dev.govo
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
schemes:
  BWG Monitor:
    build:
      targets:
        BWGMonitor: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  BWGMonitorShared:
    type: framework
    platform: iOS
    sources:
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.govo.bwgmonitor.ios.shared
        PRODUCT_NAME: BWGMonitorShared
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        ENABLE_MODULE_VERIFIER: YES
  BWGMonitor:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - target: BWGMonitorShared
      - sdk: SwiftUI.framework
      - sdk: Charts.framework
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.govo.bwgmonitor.ios
        PRODUCT_NAME: BWG Monitor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: BWG Monitor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          TARGETED_DEVICE_FAMILY: "1"
        Release:
          TARGETED_DEVICE_FAMILY: "1"
